{% extends "base.html" %}

{% block content %}
<section class="panel narrow setup-panel">
  <div>
    <h1>Set up device</h1>
  </div>

  <div class="checklist">
    <div class="checklist-item">
      <label class="bootloader-check">
        <input id="bootloader-mode" type="checkbox">
        <span>Put device in bootloader mode</span>
      </label>
    </div>

    <div class="checklist-item">
      <button
        class="task-icon task-icon-empty"
        id="flash-task-icon"
        type="button"
        aria-label="Toggle flash firmware console output"
        disabled
      ></button>
      <span>Flash firmware</span>
    </div>

    <textarea
      class="console-output"
      id="flash-console"
      readonly
      hidden
      aria-label="Flash firmware console output"
    ></textarea>

    <div class="checklist-item checklist-item-with-details">
      <button
        class="task-icon task-icon-empty"
        id="discovery-task-icon"
        type="button"
        aria-label="Toggle network discovery details"
        disabled
      ></button>
      <span>Find device on network</span>
      <p class="checklist-details" id="discovery-details" hidden></p>
    </div>

    <div class="checklist-item checklist-item-with-details">
      <button
        class="task-icon task-icon-empty"
        id="reset-nonvolatile-task-icon"
        type="button"
        aria-label="Toggle nonvolatile memory reset details"
        disabled
      ></button>
      <span>Reset nonvolatile memory</span>
      <p class="checklist-details" id="reset-nonvolatile-details" hidden></p>
    </div>

    <div class="checklist-item checklist-item-with-details">
      <button
        class="task-icon task-icon-empty"
        id="reconnect-task-icon"
        type="button"
        aria-label="Toggle device reconnect details"
        disabled
      ></button>
      <span>Wait for device to reconnect</span>
      <p class="checklist-details" id="reconnect-details" hidden></p>
    </div>

    <div class="checklist-item checklist-item-with-details">
      <button
        class="task-icon task-icon-empty"
        id="mac-address-task-icon"
        type="button"
        aria-label="Toggle MAC address details"
        disabled
      ></button>
      <span>Read MAC address</span>
      <p class="checklist-details" id="mac-address-details" hidden></p>
    </div>

    <div class="checklist-item checklist-item-with-details">
      <button
        class="task-icon task-icon-empty"
        id="self-test-task-icon"
        type="button"
        aria-label="Toggle interactive test details"
        disabled
      ></button>
      <span>Interactive test</span>
      <pre class="checklist-details checklist-details-pre" id="self-test-details" hidden></pre>
    </div>
  </div>
</section>

<script>
  const bootloaderCheckbox = document.querySelector("#bootloader-mode");
  const flashTaskIcon = document.querySelector("#flash-task-icon");
  const flashConsole = document.querySelector("#flash-console");
  const discoveryTaskIcon = document.querySelector("#discovery-task-icon");
  const discoveryDetails = document.querySelector("#discovery-details");
  const resetNonvolatileTaskIcon = document.querySelector("#reset-nonvolatile-task-icon");
  const resetNonvolatileDetails = document.querySelector("#reset-nonvolatile-details");
  const reconnectTaskIcon = document.querySelector("#reconnect-task-icon");
  const reconnectDetails = document.querySelector("#reconnect-details");
  const macAddressTaskIcon = document.querySelector("#mac-address-task-icon");
  const macAddressDetails = document.querySelector("#mac-address-details");
  const selfTestTaskIcon = document.querySelector("#self-test-task-icon");
  const selfTestDetails = document.querySelector("#self-test-details");
  let flashPollTimer = null;
  let discoveryPollTimer = null;
  let resetNonvolatilePollTimer = null;
  let macAddressPollTimer = null;
  let selfTestPollTimer = null;
  let discoveryStartRequested = false;
  let resetNonvolatileStartRequested = false;
  let macAddressStartRequested = false;
  let selfTestStartRequested = false;

  function setTaskIcon(icon, status) {
    icon.className = "task-icon";
    icon.disabled = status === "idle";

    if (status === "running") {
      icon.classList.add("task-icon-running");
    } else if (status === "success") {
      icon.classList.add("task-icon-success");
    } else if (status === "failure") {
      icon.classList.add("task-icon-failure");
    } else {
      icon.classList.add("task-icon-empty");
    }
  }

  function setFlashIcon(status) {
    setTaskIcon(flashTaskIcon, status);
  }

  function setDiscoveryIcon(status) {
    setTaskIcon(discoveryTaskIcon, status);
  }

  function setSelfTestIcon(status) {
    setTaskIcon(selfTestTaskIcon, status);
  }

  function setResetNonvolatileIcon(status) {
    setTaskIcon(resetNonvolatileTaskIcon, status);
  }

  function setReconnectIcon(status) {
    setTaskIcon(reconnectTaskIcon, status);
  }

  function setMacAddressIcon(status) {
    setTaskIcon(macAddressTaskIcon, status);
  }

  function applyFlashTaskState(state) {
    const previousStatus = flashTaskIcon.classList.contains("task-icon-success")
      ? "success"
      : null;

    setFlashIcon(state.status);
    flashConsole.value = state.output || "";
    flashConsole.scrollTop = flashConsole.scrollHeight;

    if (state.status === "running") {
      bootloaderCheckbox.checked = true;
      bootloaderCheckbox.disabled = true;
      if (!flashPollTimer) {
        flashPollTimer = setInterval(refreshFlashTaskState, 500);
      }
    } else if (state.status === "success") {
      bootloaderCheckbox.checked = true;
      bootloaderCheckbox.disabled = true;
      clearInterval(flashPollTimer);
      flashPollTimer = null;
      if (previousStatus !== "success") {
        startDiscoveryTask();
      }
    } else if (state.status === "failure") {
      bootloaderCheckbox.checked = false;
      bootloaderCheckbox.disabled = false;
      clearInterval(flashPollTimer);
      flashPollTimer = null;
    } else {
      bootloaderCheckbox.checked = false;
      bootloaderCheckbox.disabled = false;
      clearInterval(flashPollTimer);
      flashPollTimer = null;
    }
  }

  function applyDiscoveryTaskState(state) {
    setDiscoveryIcon(state.status);

    if (state.status === "success" && state.device) {
      discoveryDetails.textContent = `IP address: ${state.device.ip_address}:${state.device.port}`;
      discoveryDetails.hidden = false;
      clearInterval(discoveryPollTimer);
      discoveryPollTimer = null;
      startResetNonvolatileTask();
    } else if (state.status === "running") {
      discoveryDetails.textContent = "Searching for the newly flashed device...";
      discoveryDetails.hidden = false;
      if (!discoveryPollTimer) {
        discoveryPollTimer = setInterval(refreshDiscoveryTaskState, 1000);
      }
    } else if (state.status === "failure") {
      discoveryDetails.textContent = state.error || "Network discovery failed.";
      discoveryDetails.hidden = false;
      clearInterval(discoveryPollTimer);
      discoveryPollTimer = null;
    } else {
      discoveryDetails.textContent = "";
      discoveryDetails.hidden = true;
      clearInterval(discoveryPollTimer);
      discoveryPollTimer = null;
    }
  }

  function applyResetNonvolatileTaskState(state) {
    const resetStatus = state.reset_status || state.status;
    const reconnectStatus = state.reconnect_status || "idle";
    setResetNonvolatileIcon(resetStatus);
    setReconnectIcon(reconnectStatus);

    if (state.status === "success") {
      resetNonvolatileDetails.textContent =
        state.reset_details || "Nonvolatile memory reset command accepted.";
      reconnectDetails.textContent = state.reconnect_details || "Device reconnected.";
      clearInterval(resetNonvolatilePollTimer);
      resetNonvolatilePollTimer = null;
      startMacAddressTask();
    } else if (state.status === "running") {
      resetNonvolatileDetails.textContent =
        state.reset_details || "Resetting nonvolatile memory...";
      reconnectDetails.textContent = state.reconnect_details || "Waiting for device to reconnect...";
      resetNonvolatileDetails.hidden = resetStatus === "idle";
      reconnectDetails.hidden = reconnectStatus === "idle";
      if (!resetNonvolatilePollTimer) {
        resetNonvolatilePollTimer = setInterval(refreshResetNonvolatileTaskState, 1000);
      }
    } else if (state.status === "failure") {
      resetNonvolatileDetails.textContent =
        state.reset_details || "Nonvolatile memory reset failed.";
      reconnectDetails.textContent = state.reconnect_details || "Device did not reconnect.";
      resetNonvolatileDetails.hidden = resetStatus === "idle";
      reconnectDetails.hidden = reconnectStatus === "idle";
      clearInterval(resetNonvolatilePollTimer);
      resetNonvolatilePollTimer = null;
    } else {
      resetNonvolatileDetails.textContent = "";
      resetNonvolatileDetails.hidden = true;
      reconnectDetails.textContent = "";
      reconnectDetails.hidden = true;
      clearInterval(resetNonvolatilePollTimer);
      resetNonvolatilePollTimer = null;
    }
  }

  function applyMacAddressTaskState(state) {
    setMacAddressIcon(state.status);

    if (state.status === "success") {
      macAddressDetails.textContent = state.details || `MAC address: ${state.mac_address}`;
      clearInterval(macAddressPollTimer);
      macAddressPollTimer = null;
      startSelfTestTask();
    } else if (state.status === "running") {
      macAddressDetails.textContent = state.details || "Reading MAC address...";
      if (!macAddressPollTimer) {
        macAddressPollTimer = setInterval(refreshMacAddressTaskState, 1000);
      }
    } else if (state.status === "failure") {
      macAddressDetails.textContent = state.details || "MAC address read failed.";
      macAddressDetails.hidden = false;
      clearInterval(macAddressPollTimer);
      macAddressPollTimer = null;
    } else {
      macAddressDetails.textContent = "";
      macAddressDetails.hidden = true;
      clearInterval(macAddressPollTimer);
      macAddressPollTimer = null;
    }
  }

  function applySelfTestTaskState(state) {
    setSelfTestIcon(state.status);

    if (state.status === "success") {
      selfTestDetails.textContent = state.details || "Interactive self test passed.";
      clearInterval(selfTestPollTimer);
      selfTestPollTimer = null;
    } else if (state.status === "running") {
      selfTestDetails.textContent = state.details || "Interactive self test is running...";
      if (!selfTestPollTimer) {
        selfTestPollTimer = setInterval(refreshSelfTestTaskState, 1000);
      }
    } else if (state.status === "failure") {
      selfTestDetails.textContent = state.details || "Interactive self test failed.";
      selfTestDetails.hidden = false;
      clearInterval(selfTestPollTimer);
      selfTestPollTimer = null;
    } else {
      selfTestDetails.textContent = "";
      selfTestDetails.hidden = true;
      clearInterval(selfTestPollTimer);
      selfTestPollTimer = null;
    }
  }

  async function refreshFlashTaskState() {
    const response = await fetch("/api/setup/flash");
    applyFlashTaskState(await response.json());
  }

  async function refreshDiscoveryTaskState() {
    const response = await fetch("/api/setup/network-discovery");
    applyDiscoveryTaskState(await response.json());
  }

  async function refreshMacAddressTaskState() {
    const response = await fetch("/api/setup/mac-address");
    applyMacAddressTaskState(await response.json());
  }

  async function refreshResetNonvolatileTaskState() {
    const response = await fetch("/api/setup/reset-nonvolatile-memory");
    applyResetNonvolatileTaskState(await response.json());
  }

  async function refreshSelfTestTaskState() {
    const response = await fetch("/api/setup/interactive-self-test");
    applySelfTestTaskState(await response.json());
  }

  async function startFlashTask() {
    bootloaderCheckbox.checked = true;
    bootloaderCheckbox.disabled = true;
    const response = await fetch("/api/setup/flash", {
      method: "POST",
    });
    applyFlashTaskState(await response.json());
  }

  async function startDiscoveryTask() {
    if (discoveryStartRequested) return;
    discoveryStartRequested = true;
    const currentResponse = await fetch("/api/setup/network-discovery");
    const currentState = await currentResponse.json();
    if (currentState.status === "running" || currentState.status === "success") {
      applyDiscoveryTaskState(currentState);
      return;
    }

    const response = await fetch("/api/setup/network-discovery", { method: "POST" });
    applyDiscoveryTaskState(await response.json());
  }

  async function startResetNonvolatileTask() {
    if (resetNonvolatileStartRequested) return;
    resetNonvolatileStartRequested = true;
    const currentResponse = await fetch("/api/setup/reset-nonvolatile-memory");
    const currentState = await currentResponse.json();
    if (currentState.status === "running" || currentState.status === "success") {
      applyResetNonvolatileTaskState(currentState);
      return;
    }

    const response = await fetch("/api/setup/reset-nonvolatile-memory", { method: "POST" });
    applyResetNonvolatileTaskState(await response.json());
  }

  async function startMacAddressTask() {
    if (macAddressStartRequested) return;
    macAddressStartRequested = true;
    const currentResponse = await fetch("/api/setup/mac-address");
    const currentState = await currentResponse.json();
    if (currentState.status === "running" || currentState.status === "success") {
      applyMacAddressTaskState(currentState);
      return;
    }

    const response = await fetch("/api/setup/mac-address", { method: "POST" });
    applyMacAddressTaskState(await response.json());
  }

  async function startSelfTestTask() {
    if (selfTestStartRequested) return;
    selfTestStartRequested = true;
    const currentResponse = await fetch("/api/setup/interactive-self-test");
    const currentState = await currentResponse.json();
    if (currentState.status === "running" || currentState.status === "success") {
      applySelfTestTaskState(currentState);
      return;
    }

    const response = await fetch("/api/setup/interactive-self-test", { method: "POST" });
    applySelfTestTaskState(await response.json());
  }

  bootloaderCheckbox.addEventListener("change", () => {
    if (bootloaderCheckbox.checked) {
      startFlashTask();
    }
  });

  flashTaskIcon.addEventListener("click", () => {
    flashConsole.hidden = !flashConsole.hidden;
  });

  discoveryTaskIcon.addEventListener("click", () => {
    discoveryDetails.hidden = !discoveryDetails.hidden;
  });

  resetNonvolatileTaskIcon.addEventListener("click", () => {
    resetNonvolatileDetails.hidden = !resetNonvolatileDetails.hidden;
  });

  reconnectTaskIcon.addEventListener("click", () => {
    reconnectDetails.hidden = !reconnectDetails.hidden;
  });

  macAddressTaskIcon.addEventListener("click", () => {
    macAddressDetails.hidden = !macAddressDetails.hidden;
  });

  selfTestTaskIcon.addEventListener("click", () => {
    selfTestDetails.hidden = !selfTestDetails.hidden;
  });

  refreshFlashTaskState();
  refreshDiscoveryTaskState();
  refreshResetNonvolatileTaskState();
  refreshMacAddressTaskState();
  refreshSelfTestTaskState();
</script>
{% endblock %}
